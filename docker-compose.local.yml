services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rca-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-adminuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminuser_local_pw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_provisioning/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adminuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rca

  redis:
    image: redis:7-alpine
    container_name: rca-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_local_pw}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_local_pw}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rca

  auth-service:
    build:
      context: ./auth-service
    container_name: rca-auth
    env_file: ./auth-service/.env
    environment:
      DATABASE_URL: postgresql://adminuser:${POSTGRES_PASSWORD:-adminuser_local_pw}@db:5432/appdb
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rca

  backend:
    build:
      context: ./backend
    container_name: rca-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://adminuser:${POSTGRES_PASSWORD:-adminuser_local_pw}@db:5432/appdb
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_local_pw}@redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:3001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rca

  frontend:
    build:
      context: ./frontend
    container_name: rca-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - auth-service
    networks:
      - rca

networks:
  rca:
    driver: bridge

volumes:
  pgdata:
